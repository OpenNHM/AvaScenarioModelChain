[mod1Release_praDelineationVeitinger_override]
# use default praDelineation config as base configuration (True) and override following parameters
# if False and local_praDelineationVeitinger is available use local
defaultConfig = True

# if customPaths is True, the paths to DEM and forest are provided directly
# if customPaths is False, the files are provided in the AvaFrame structure
customPaths = False

forestType = pcc
saveAllThresholds = False
singleThreshold = 0.30
radius = 6
prob = 0.5
winddir = 0
windtol = 180


[mod1Release_mod1Release_override]
# use default mod1Release config as base configuration (True) and override following parameters
# if False and local_praUtils is available use local
defaultConfig = True

streamThreshold = 500
minLength = 100
smoothingWindowSize = 5
weightedSlopeFlow = False

minDirectNeighborsPass1 = 3
minDiagonalNeighborsPass2 = 2
outputCompression = LZW
maskNoDataValue = 0


[mod2Mobility_compParams_override]
# use default parameterization config as base configuration (True) and override following parameters
# if False and local_compParams is available use local
defaultConfig = True

# Rel vol size dependent parametrization for
# > dry:
sizeMax = 5
alphaSize2 = 32
deltaAlpha = 3
uMaxSize2 = 20
deltaUMax = 15
constantExp = True
constantExpValue = 12
constantPraThickness = True
praThickness = 1

# Rel vol size dependent parametrization shift for
# > wet:
alphaDependendTemperature = True
sizeShiftAlpha = 0.5
sizeShiftUmax = -0.75
sizeShiftExp = 12

# Results to size
resParamsToSize =

# snow climate (not used ATM)
D0 = 0
deltaD = 0.001
constantTemperature = True
Tcons = -11
T0 = 0
deltaT = -0.01
TCold = -11
TWarm = -1