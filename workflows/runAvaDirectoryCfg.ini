# ----------------------------- AvaDirectory Builder ----------------------------- #
#
# Build Steps 13–15 from existing FlowPy results. Both current flat and old
# nested structures below 09_flowPyBigDataStructure are discovered recursively.
#
# pixi shell --environment dev
# python workflows/runAvaDirectory.py
#
# -------------------------------------------------------------------------------- #

[PATHS]
# Model-chain directory containing 09_flowPyBigDataStructure.
# Outputs are written to 11_avaDirectoryData and 12_avaDirectory below this root.
projectRoot =


[WORKFLOW]
# True runs all three AvaDirectory steps.
runAllAvaDirSteps = True

# Individual flags are used only when runAllAvaDirSteps=False.
avaDirBuildFromFlowPy = False
avaDirType = False
avaDirResults = False

# Optional processing of one pra* directory.
makeSingleTestRun = False
singleTestDir =

logLevel = INFO


[avaDIRECTORY]
# Used when source metadata does not contain a subcatchment threshold.
subcatchmentThreshold = 500

# Step 13 output mode
writeSingleAvaGeoJSON = True
writeScenarioParquet = False

# Step 14 input mode
readSingleAvaGeoJSON = True
readScenarioParquet = False

# Step 13 processing flags
doProcess = True
doSplit = True
doMergeReljson = True
doEnrich = True
doExtractMetadata = True
doClipRasters = True
doCollectSingleAva = True

# Reuse complete Map/singleAvaDir/com4_* folders when False.
forceRebuildData = False

# Step 13 tuning
maxClipWorkers = 8

# Step 15 raster index and rebuild behavior
buildResultsRasterIndex = True
forceRebuildIndex = True
forceRebuildResults = True

# Step 14 output formats
writeTypeCsv = True
writeTypeGeoJSON = True
writeTypeParquet = True

# Step 15 output formats
writeResultsCsv = True
writeResultsGeoJSON = True
writeResultsParquet = True
